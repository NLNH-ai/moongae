spring:
  datasource:
    url: jdbc:h2:mem:company_website;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        globally_quoted_identifiers: true
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

jwt:
  secret: test-secret-key-for-company-website-authentication
  expiration: 86400000

file:
  upload-dir: build/test-uploads
  allowed-image-types:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
